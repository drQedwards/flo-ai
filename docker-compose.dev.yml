version: '3.8'

services:
  postgres:
    image: ankane/pgvector
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=floware
    ports:
      - '5432:5432'
    volumes:
      - /var/lib/postgres-data:/var/lib/postgresql/data
      - /var/lib/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - floware-network

  redis:
    image: redis:7.4
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - floware-network

volumes:
  db:
    driver: local

networks:
  floware-network:
    driver: bridge
