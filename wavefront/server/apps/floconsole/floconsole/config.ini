[database]
username = ${CONSOLE_DB_USERNAME}
password = ${CONSOLE_DB_PASSWORD}
host = ${CONSOLE_DB_HOST}
port = ${CONSOLE_DB_PORT}
db_name = ${CONSOLE_DB_NAME}

[env_config]
app_env = ${APP_ENV}

[jwt_token]
token_expiry=${TOKEN_EXPIRY}
temporary_token_expiry=${TEMPORARY_TOKEN_EXPIRY}
private_key=${PRIVATE_KEY}
public_key=${PUBLIC_KEY}
enable_cloud_kms=${ENABLE_CLOUD_KMS}
token_prefix=${CONSOLE_TOKEN_PREFIX:fc_}
issuer=${CONSOLE_JWT_ISSUER:https://console.rootflo.ai}
audience=${CONSOLE_JWT_AUDIENCE:https://console.rootflo.ai}

[super_admin]
email = ${SUPER_ADMIN_EMAIL:vishnu@rootflo.ai}

[deployment]
build_trigger_url=${BUILD_TRIGGER_URL}
