[app_config]
client_id = ${CLIENT_ID}
client_secret = ${CLIENT_SECRET}
product_id = ${PRODUCT_ID}

[env_config]
app_env = ${APP_ENV}
app_name = ${APP_NAME:floware}

[database]
username = ${DB_USERNAME}
password = ${DB_PASSWORD}
host = ${DB_HOST}
port = ${DB_PORT}
db_name = ${DB_NAME}

[redshift]
username = ${REDSHIFT_USERNAME}
password = ${REDSHIFT_PASSWORD}
host = ${REDSHIFT_HOST}
port = ${REDSHIFT_PORT}
db_name = ${REDSHIFT_DB}

[insights]
today_as_max_from_db=${INSIGHTS_TODAY_AS_MAX_DATE}

[redis]
protocol = ${REDIS_PROTOCOL}
host = ${REDIS_HOST}
port = ${REDIS_PORT}

[azure]
azure_embeddings_endpoint = ${AZURE_OPEN_AI_EMBEDDING_ENDPOINT}
azure_embeddings_deployment = ${AZURE_EMBEDDINGS_DEPLOYMENT}
azure_embeddings_api_key = ${AZURE_OPEN_EMBEDDING_AI_KEY}
client_id = ${AZURE_CLIENT_ID}
tenant_id = ${AZURE_TENANT_ID}
client_secret = ${AZURE_CLIENT_SECRET}
scopes = ${AZURE_SCOPES}
redirect_uri = ${AZURE_REDIRECT_URI}

[google]
secret_file_path = ${GOOGLE_SECRET_FILE_PATH}
scopes = ${GOOGLE_SCOPES}
redirect_uri = ${GOOGLE_REDIRECT_URI}

[extractor]
tesseract_path = ${TESSERACT_PATH}

[azure_openai]
endpoint = ${AZURE_OPENAI_ENDPOINT}
api_key = ${AZURE_OPENAI_API_KEY}
api_version = ${AZURE_OPENAI_API_VERSION}

[slack]
client_id = ${SLACK_CLIENT_ID}
client_secret = ${SLACK_CLIENT_SECRET}
scopes = ${SLACK_SCOPES}
redirect_uri = ${SLACK_REDIRECT_URI}

[jwt_token]
token_expiry=${TOKEN_EXPIRY}
temporary_token_expiry=${TEMPORARY_TOKEN_EXPIRY}
private_key=${PRIVATE_KEY}
public_key=${PUBLIC_KEY}
enable_cloud_kms=${ENABLE_CLOUD_KMS}
console_token_prefix=${CONSOLE_TOKEN_PREFIX:fc_}
issuer=${FLOWARE_JWT_ISSUER:https://floware.rootflo.ai}
audience=${FLOWARE_JWT_AUDIENCE:https://floware.rootflo.ai}
validation_issuer=${FLOWARE_JWT_VALIDATION_ISSUER:https://console.rootflo.ai,https://floware.rootflo.ai} # allow console as well

[superset]
url=${SUPERSET_URL}
username=${SUPERSET_USERNAME}
password=${SUPERSET_PASSWORD}

[web]
url=${WEB_URL}

[aws]
aws_access_key=${AWS_ACCESS_KEY_ID}
aws_secret_key=${AWS_SECRET_ACCESS_KEY}
transcript_bucket_name=${TRANSCRIPT_BUCKET_NAME}
aws_asset_storage_bucket=${AWS_GOLD_ASSET_BUCKET_NAME}
audio_bucket_name=${AUDIO_BUCKET_NAME}
model_storage_bucket=${MODEL_STORAGE_BUCKET}
queue_url=${AWS_QUEUE_URL}
region=${AWS_REGION}

[gcp]
transcript_bucket_name=${TRANSCRIPT_BUCKET_NAME}
audio_bucket_name=${AUDIO_BUCKET_NAME}
model_storage_bucket=${MODEL_STORAGE_BUCKET}
gcp_service_account_json = ${GCP_SERVICE_ACCOUNT_JSON}
gcp_asset_storage_bucket = ${GCP_ASSET_STORAGE_BUCKET}
gcp_project_id = ${GCP_PROJECT_ID}
gold_topic_id=${GCP_GOLD_TOPIC_ID}
email_topic_id=${GCP_EMAIL_TOPIC_ID}
gcp_storage_bucket_name = ${GCP_STORAGE_BUCKET_NAME}
gcp_location = ${GCP_LOCATION}
gcp_key_ring = ${GCP_KMS_KEY_RING}
gcp_crypto_key = ${GCP_KMS_CRYPTO_KEY}
gcp_crypto_key_version = ${GCP_KMS_CRYPTO_KEY_VERSION}
config_file_name=${CONFIG_FILE_NAME}

[bigquery]
project_id=${BQ_PROJECT_ID}
dataset_id=${BQ_DATASET_ID}

[cloud_config]
cloud_provider=${CLOUD_PROVIDER}

[email]
email_provider=${EMAIL_PROVIDER}

[outlook]
client_id=${OUTLOOK_CLIENT_ID}
client_secret=${OUTLOOK_CLIENT_SECRET}
tenant_id=${OUTLOOK_TENANT_ID}
email_id=${OUTLOOK_SENDER_EMAILID}
authority=${AUTHORITY}
webhook_url=${WEBHOOK_URL}

[gmail]
service_account_file=${GMAIL_SERVICE_ACCOUNT_FILE}
email_sender=${GMAIL_SENDER_EMAILID}
delegate_user=${GMAIL_DELEGATE_USER}

[scheduler]
daily_alert_cron=${DAILY_ALERT_CRON:0 5 * * *}
weekly_alert_cron=${WEEKLY_ALERT_CRON:0 6 * * 1}
usage_metric_cron=${USAGE_METRIC_CRON:0 * * * *}
daily_leads_cron=${DAILY_LEADS_CRON:30 5 * * *}

[usage_metric]
url=${USAGE_METRIC_URL}

[openai]
openai_api_key=${OPENAI_API_KEY}
openai_model_name=${OPENAI_MODEL_NAME}

[leads]
enabled=${LEADS_ENABLED}

[agents]
agent_yaml_bucket=${AGENT_YAML_BUCKET}

[auth]
max_failed_attempts=${MAX_FAILED_ATTEMPTS}
lockout_duration_hours=${LOCKOUT_DURATION_HOURS}
inactive_days_threshold=${INACTIVE_DAYS_THRESHOLD:60}

[model]
inference_service_url=${INFERENCE_SERVICE_URL}

[embedding_url]
embedding_service_url=${EMBEDDING_SERVICE_URL}

[image_search]
reference_images_bucket = ${IMAGE_SEARCH_REFERENCE_IMAGES_BUCKET}

[voice_agents]
call_processing_base_url=${CALL_PROCESSING_BASE_URL}
voice_agent_bucket=${VOICE_AGENT_BUCKET}

[api_service]
application_bucket=${APPLICATION_BUCKET}

[hermes]
url=${HERMES_URL:http://localhost:8080/flo-hermes}

[workflow]
worker_topic=${WORKFLOW_WORKER_TOPIC}
