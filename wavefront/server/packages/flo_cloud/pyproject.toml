[project]
name = "flo-cloud"
version = "0.1.0"
description = "Cloud service helper functions for flo apps"
authors = [
    { name = "rootflo engineering", email = "engineering@rootflo.ai" }
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "boto3<=1.38.40",
    "cryptography>=45.0.4",
    "google-cloud-bigquery==3.34.0",
    "google-cloud-kms>=3.5.1",
    "google-cloud-storage<3.0.0",
    "google-cloud-pubsub>=2.28.0",
    "redshift-connector>=2.1.7",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["flo_cloud"]
